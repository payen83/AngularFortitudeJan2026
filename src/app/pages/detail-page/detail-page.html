<div class="container">
    <mat-card class="item-card" appearance="outlined">
        <mat-card-header>
            <mat-card-title>{{ product.title }}</mat-card-title>
            <mat-card-subtitle>RM{{ product.price }}</mat-card-subtitle>
        </mat-card-header>
        <img mat-card-image [src]="product.image">
        <mat-card-content>
            <p>{{product.description}}</p>
        </mat-card-content>
        <mat-card-actions>
            <button mat-button (click)="goBack()">Back</button>
        </mat-card-actions>
    </mat-card>
</div>
